<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#181824" />
      <stop offset="100%" stop-color="#050507" />
    </radialGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF099" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA8C2C" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#0284C7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shield/Circle -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#goldGrad)" stroke-width="12" opacity="0.8" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#cyanGrad)" stroke-width="4" opacity="0.4" stroke-dasharray="16 12" />

  <!-- Light Beams / Rays in original colors -->
  <g opacity="0.3" filter="url(#glow)">
    <line x1="256" y1="40" x2="256" y2="472" stroke="#D4AF37" stroke-width="4" />
    <line x1="40" y1="256" x2="472" y2="256" stroke="#D4AF37" stroke-width="4" />
    <line x1="103" y1="103" x2="409" y2="409" stroke="#38BDF8" stroke-width="3" />
    <line x1="103" y1="409" x2="409" y2="103" stroke="#38BDF8" stroke-width="3" />
  </g>

  <!-- Central "14" Crest -->
  <g transform="translate(0,0)">
    <!-- Digit 1 -->
    <path d="M 175 140 L 210 120 L 210 380 L 170 380 L 170 160 Z" fill="url(#goldGrad)" filter="url(#glow)" />
    <!-- Digit 4 -->
    <path d="M 335 120 L 335 270 L 365 270 L 365 310 L 335 310 L 335 380 L 295 380 L 295 310 L 235 310 L 235 265 L 295 120 Z M 295 180 L 265 270 L 295 270 Z" fill="url(#goldGrad)" filter="url(#glow)" />
  </g>

  <!-- Glowing Star Core -->
  <circle cx="256" cy="70" r="16" fill="#FFF099" filter="url(#glow)" />
  <polygon points="256,50 262,64 276,70 262,76 256,90 250,76 236,70 250,64" fill="#FFFFFF" />
</svg>
